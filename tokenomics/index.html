<style>
body {
  margin: 0;
  padding: 20px 0px;
  background: #110F2A;
  color: white;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

canvas { margin-top: 20px; cursor: pointer; }

.timeline, .legend {
  display: flex;
  justify-content: space-between;
  width: 420px;
  margin-top: 20px;
  flex-wrap: wrap;
  padding:0px 20px;
}

.node, .legend-item {
  cursor: pointer;
  text-align: center;
  margin: 5px;
}

.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid #aaa;
  margin: auto;
}

.active { background: #9F7AEA; }

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  opacity: 1;
}

.legend-item.disabled {
  opacity: 0.3;
}

.color-box {
  width: 12px;
  height: 12px;
}

.tooltip {
  position: absolute;
  background: rgba(0,0,0,0.8);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  pointer-events: none;
  display: none;
}


    /* mobile changes */

    div.market-demand {
        margin-top: 30px;
        width: 400px;
        text-align: center;
    }

    div.market-demand {
        width: 385px;
    }


    /* mobile */

    .timeline, .legend {
        width: 390px;
    }

    /* /mobile */
    


    /* wider than mobile  */
    @media only screen and (min-width: 520px) {

        .timeline, .legend {
            width: 420px;
        }
        div.market-demand {
            width: 400px;
        }
        
    }

</style>
</head>

<body>

<h1 id="title"></h1>
<div id="total"></div>

<canvas id="chart" width="420" height="420"></canvas>

<div class="legend" id="legend"></div>
<div class="timeline" id="timeline"></div>

<div class="market-demand">
  <div>Market Demand</div>
  <input id="slider" type="range" min="0.5" max="2.0" step="0.05" value="1" style="width:100%;">
  <div id="sliderLabel"></div>
</div>

<div id="tooltip" class="tooltip"></div>

<script>
const tokenomicsData = {
  1: [
    { name: "Miners", value: 25 },
    { name: "Treasury", value: 120 },
    { name: "Founders", value: 70 },
    { name: "Grants", value: 60 },
    { name: "Stakeholders", value: 20 },
    { name: "Marketing", value: 20 },
    { name: "Moltbook Airdrop", value: 15 },
  ],
  2: [
    { name: "Miners", value: 45 },
    { name: "Treasury", value: 120 },
    { name: "Founders", value: 70 },
    { name: "Grants", value: 60 },
    { name: "Stakeholders", value: 20 },
    { name: "Marketing", value: 20 },
  ],
  3: [
    { name: "Miners", value: 54 },
    { name: "Treasury", value: 80 },
    { name: "Founders", value: 70 },
    { name: "Grants", value: 50 },
    { name: "Stakeholders", value: 20 },
  ],
  4: [
    { name: "Miners", value: 101 },
    { name: "Treasury", value: 80 },
    { name: "Founders", value: 70 },
    { name: "Grants", value: 50 },
  ],
};

const COLORS = ["#0088FE","#00C49F","#FFBB28","#FF8042","#AF19FF","#FF4560","#19A7FF"];
const yearLabels = ["2026","2027","2028","2029"];

let year = 1;
let marketFactor = 1;
let visible = {};
let currentData = [];
let targetData = [];

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");
const tooltip = document.getElementById("tooltip");

const OUTER = 130;
const INNER = 70;

function getData(factor = marketFactor) {
  return tokenomicsData[year].map(d => ({
    ...d,
    value: d.name === "Miners" ? d.value * factor : d.value
  }));
}

function interpolate(a, b, t) {
  return a + (b - a) * t;
}

function animateTo(newData) {
  const duration = 500;
  const start = performance.now();

  function frame(time) {
    let t = Math.min((time - start) / duration, 1);

    currentData = newData.map((d, i) => ({
      ...d,
      value: interpolate(
        currentData[i]?.value || 0,
        d.value,
        t
      )
    }));

    draw();

    if (t < 1) requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
}

function draw(mouseX=null, mouseY=null) {
  ctx.clearRect(0,0,420,420);

  const data = currentData.filter(d => visible[d.name] !== false);
  const total = data.reduce((s,d)=>s+d.value,0);

  let start = -Math.PI/2;
  let hovered = null;

  data.forEach((d,i)=>{
    const slice = (d.value/total)*Math.PI*2;

    // detect hover
    let isHovered = false;
    if (mouseX !== null) {
      const dx = mouseX-210;
      const dy = mouseY-210;
      const dist = Math.sqrt(dx*dx+dy*dy);
      let angle = Math.atan2(dy,dx);
      if (angle < -Math.PI/2) angle += 2*Math.PI;

      if (dist < OUTER && dist > INNER && angle >= start && angle <= start+slice) {
        isHovered = true;
        hovered = d;
      }
    }

    const radius = isHovered ? OUTER + 6 : OUTER;

    ctx.beginPath();
    ctx.arc(210,210,radius,start,start+slice);
    ctx.arc(210,210,INNER,start+slice,start,true);
    ctx.closePath();

    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();

    // label on hover
    if (isHovered) {
      const mid = start + slice/2;
      const lx = 210 + Math.cos(mid) * (OUTER + 20);
      const ly = 210 + Math.sin(mid) * (OUTER + 20);

      ctx.fillStyle = "white";
      ctx.font = "12px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(d.name, lx, ly);
    }

    start += slice;
  });

  // tooltip
  if (hovered) {
    tooltip.style.display = "block";
    tooltip.innerText = hovered.name + ": " + hovered.value.toFixed(2);
  } else {
    tooltip.style.display = "none";
  }

  // center metric
  const baseline = getData(1).reduce((s,d)=>s+d.value,0);
  const delta = total - baseline;

  ctx.textAlign = "center";

  ctx.fillStyle = "white";
  ctx.font = "bold 18px sans-serif";
  ctx.fillText(total.toFixed(1), 210, 200);

  ctx.font = "12px sans-serif";
  ctx.fillStyle = "#aaa";
  ctx.fillText("Total Supply", 210, 220);

  ctx.font = "bold 14px sans-serif";
  ctx.fillStyle = delta >= 0 ? "#00FFAA" : "#FF4560";
  ctx.fillText(
    (delta >= 0 ? "+" : "") + delta.toFixed(1),
    210,
    245
  );

  ctx.font = "11px sans-serif";
  ctx.fillStyle = "#777";
  ctx.fillText("Δ vs baseline", 210, 260);

  document.getElementById("title").innerText =
    "Token Allocation — " + yearLabels[year-1];
}

canvas.onmousemove = (e)=>{
  const rect = canvas.getBoundingClientRect();
  draw(e.clientX-rect.left, e.clientY-rect.top);

  tooltip.style.left = e.clientX + 10 + "px";
  tooltip.style.top = e.clientY + 10 + "px";
};

canvas.onmouseleave = ()=> tooltip.style.display="none";

function rebuild() {
  targetData = getData();
  animateTo(targetData);
  buildLegend();
  buildTimeline();
}

function buildLegend() {
  const el = document.getElementById("legend");
  el.innerHTML = "";

  targetData.forEach((d,i)=>{
    if (!(d.name in visible)) visible[d.name]=true;

    const item = document.createElement("div");
    item.className = "legend-item" + (visible[d.name] ? "" : " disabled");

    item.onclick = ()=>{
      visible[d.name] = !visible[d.name];
      rebuild();
    };

    const box = document.createElement("div");
    box.className="color-box";
    box.style.background = COLORS[i % COLORS.length];

    item.appendChild(box);
    item.appendChild(document.createTextNode(d.name));

    el.appendChild(item);
  });
}

function buildTimeline() {
  const el = document.getElementById("timeline");
  el.innerHTML="";

  [1,2,3,4].forEach((y,i)=>{
    const node = document.createElement("div");
    node.className="node";

    const dot = document.createElement("div");
    dot.className="dot"+(y===year?" active":"");

    node.onclick=()=>{
      year=y;
      rebuild();
    };

    node.appendChild(dot);
    node.appendChild(document.createTextNode(yearLabels[i]));

    el.appendChild(node);
  });
}

document.getElementById("slider").oninput = e=>{
  marketFactor = parseFloat(e.target.value);
  document.getElementById("sliderLabel").innerText =
    "Miner Reward Adjustment: " + (marketFactor*100).toFixed(0)+"%";
  rebuild();
};

// init
currentData = getData();
rebuild();
</script>

</body>
</html>
