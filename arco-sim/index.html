<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>ARCO Simulator</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">

    <!-- Run Button -->
    <button id="runBtn" class="run-btn">
      ▶ Run Simulation
    </button>

    <!-- Status -->
    <div class="status">
      <div id="iteration"></div>
      <div id="marketPhase"></div>
      <div id="activeNode"></div>
    </div>

    <!-- Nodes Section -->
    <h3 class="section-title">Nodes in Network</h3>
    <div class="nodes">
      <div class="node" id="node-A">A<br>Sensor</div>
      <div class="node" id="node-B">B<br>Relay</div>
      <div class="node" id="node-C">C<br>Compute</div>
      <div class="node" id="node-D">D<br>Actuator</div>
      <div class="node" id="node-E">E<br>Event</div>
    </div>

    <!-- Chart Section -->
    <h3 class="section-title">Current Market State</h3>
    <div id="chart"></div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="right">

    <!-- Pseudocode Section -->
    <h3 class="section-title">Code Running at Node</h3>
    <pre id="pseudocode"></pre>

  </div>

</div>

<script src="js/state.js"></script>
<script src="js/simulation.js"></script>
<script src="js/ui.js"></script>
<script src="js/chart.js"></script>
<script src="js/pseudocode.js"></script>

</body>
</html>
